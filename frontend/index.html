<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LawYaar</title>
  <link rel="stylesheet" href="output.css">
</head>
<body class="bg-gray-50">

 <body class="bg-slate-900 text-white">

  <!-- Navbar -->
  <nav class="flex items-center justify-between px-8 py-4 bg-slate-800 shadow-lg">
    <div class="flex items-center gap-3">
      <img src="assets/logo.png" alt="LawYaar Logo" class="w-12 h-12 object-contain">
      <h1 class="text-2xl font-bold tracking-wide">LawYaar</h1>
    </div>

    <button class="bg-blue-600 px-4 py-2 rounded-lg hover:bg-blue-700 transition">
      Get Started
    </button>
  </nav>

  <!-- Hero Section -->
  <section class="text-center mt-20 px-6">
    <h2 class="text-4xl md:text-5xl font-bold mb-6">
      Empowering You Through Legal Knowledge
    </h2>

    <p class="text-gray-300 max-w-2xl mx-auto mb-8">
      Ask any legal question and get simplified explanations instantly.
    </p>

    <!-- Chat Input Preview -->
    <div class="flex justify-center">
      <input 
        type="text" 
        placeholder="Ask your legal question..." 
        class="w-full max-w-xl px-5 py-3 rounded-l-lg text-black outline-none"
      >
      <button class="bg-blue-600 px-6 py-3 rounded-r-lg hover:bg-blue-700">
        Ask
      </button>
    </div>
  </section>

</body>

</body>
</html>
